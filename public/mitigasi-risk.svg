<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#fcf8f8" />

  <!-- SOP Document -->
  <path d="M14,10 H34 L46,22 V54 H14 Z" 
        fill="#ffffff" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />
  <!-- Document Fold -->
  <path d="M34,10 V22 H46" 
        fill="#f1f5f9" stroke="#475569" stroke-width="2.5" stroke-linejoin="round" />

  <!-- SOP Lines -->
  <line x1="20" y1="22" x2="28" y2="22" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  <line x1="20" y1="28" x2="40" y2="28" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  <line x1="20" y1="34" x2="34" y2="34" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />

  <!-- Incident Badge (Warning) -->
  <circle cx="46" cy="44" r="10" fill="#ef4444" />
  <line x1="46" y1="40" x2="46" y2="45" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <circle cx="46" cy="49" r="1" fill="#ffffff" />

  <!-- Calculation / Math Symbols Area (Kalkulasi) -->
  <g transform="translate(14, 40)">
    <!-- Small Calculator/Grid Icon -->
    <rect x="2" y="2" width="14" height="14" rx="2" fill="#3b82f6" />
    <!-- Math symbols inside -->
    <line x1="5" y1="7" x2="9" y2="7" stroke="#ffffff" stroke-width="1.5" />
    <line x1="7" y1="5" x2="7" y2="9" stroke="#ffffff" stroke-width="1.5" />
    <line x1="11" y1="6" x2="13" y2="8" stroke="#ffffff" stroke-width="1.5" />
    <line x1="11" y1="8" x2="13" y2="6" stroke="#ffffff" stroke-width="1.5" />
  </g>
  
  <!-- Gear (Process/Protocol) -->
  <circle cx="40" cy="12" r="4" fill="none" stroke="#f59e0b" stroke-width="2" />
  <path d="M40,6 V8 M40,16 V18 M34,12 H36 M44,12 H46" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" />
</svg>
