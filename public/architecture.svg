<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 360" font-family="'Plus Jakarta Sans',Segoe UI,Arial,sans-serif">
  <defs>
    <style>
      .node { fill: #ffffff; stroke: #e7e5e4; stroke-width: 1.5; }
      .title { fill: #1c1917; font-weight: 800; font-size: 15px; }
      .sub { fill: #78716c; font-weight: 600; font-size: 11px; }
      .lane { fill: #faf9f7; stroke: #e7e5e4; stroke-width: 1; }
      .lane-label { fill: #a8a29e; font-weight: 800; font-size: 10px; letter-spacing: 1.5px; }
      .flow { stroke: #a8a29e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .icon { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a8a29e"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="40" y="44" fill="#1c1917" font-size="24" font-weight="800">PestGuard AI — System Architecture</text>
  <text x="40" y="66" fill="#78716c" font-size="13" font-weight="600">Real-time bio-hazard &amp; pest detection pipeline for PT. Kawan Lama warehouses</text>

  <!-- Lanes -->
  <rect class="lane" x="40" y="92" width="300" height="210" rx="14"/>
  <text class="lane-label" x="56" y="116">INPUT / EDGE</text>
  <rect class="lane" x="360" y="92" width="430" height="210" rx="14"/>
  <text class="lane-label" x="376" y="116">AI / BACKEND</text>
  <rect class="lane" x="810" y="92" width="330" height="210" rx="14"/>
  <text class="lane-label" x="826" y="116">PERSISTENCE / DELIVERY</text>

  <!-- INPUT lane -->
  <!-- Camera / Simulator -->
  <rect class="node" x="64" y="140" width="120" height="74" rx="12"/>
  <rect x="80" y="158" width="32" height="32" rx="8" fill="#44403c14"/>
  <path class="icon" stroke="#44403c" d="M101 174l11-5.5a1 1 0 011.4.9v9.2a1 1 0 01-1.4.9L101 174M86 182h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" transform="translate(-2,-2) scale(0.9) translate(10,18)"/>
  <text class="title" x="124" y="170" text-anchor="middle">Camera /</text>
  <text class="title" x="124" y="188" text-anchor="middle">Simulator</text>
  <text class="sub" x="124" y="204" text-anchor="middle">720p · RTSP / video</text>

  <!-- CLAHE -->
  <rect class="node" x="196" y="140" width="120" height="74" rx="12"/>
  <text class="title" x="256" y="172" text-anchor="middle">CLAHE</text>
  <text class="sub" x="256" y="190" text-anchor="middle">Low-light</text>
  <text class="sub" x="256" y="204" text-anchor="middle">enhancement</text>

  <!-- AI/BACKEND lane -->
  <!-- Zone Workers -->
  <rect class="node" x="376" y="140" width="120" height="74" rx="12"/>
  <text class="title" x="436" y="172" text-anchor="middle">Zone Workers</text>
  <text class="sub" x="436" y="190" text-anchor="middle">Per-camera</text>
  <text class="sub" x="436" y="204" text-anchor="middle">threads · skip=3</text>

  <!-- YOLO11 -->
  <rect class="node" x="508" y="140" width="120" height="74" rx="12" stroke="#1c1917" stroke-width="2"/>
  <text class="title" x="568" y="168" text-anchor="middle">YOLO11-Nano</text>
  <text class="sub" x="568" y="186" text-anchor="middle">320px inference</text>
  <text class="sub" x="568" y="200" text-anchor="middle">94.0% mAP@50</text>

  <!-- FastAPI -->
  <rect class="node" x="640" y="140" width="120" height="74" rx="12"/>
  <text class="title" x="700" y="172" text-anchor="middle">FastAPI</text>
  <text class="sub" x="700" y="190" text-anchor="middle">REST + WS</text>
  <text class="sub" x="700" y="204" text-anchor="middle">RBAC · audit</text>

  <!-- PERSISTENCE/DELIVERY lane -->
  <!-- SQLite -->
  <rect class="node" x="826" y="128" width="138" height="48" rx="10"/>
  <text class="title" x="895" y="150" text-anchor="middle">SQLite (WAL)</text>
  <text class="sub" x="895" y="166" text-anchor="middle">Logs · users · audit</text>

