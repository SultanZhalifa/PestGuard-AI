  <rect class="node" x="826" y="184" width="138" height="48" rx="10"/>
  <text class="title" x="895" y="206" text-anchor="middle">Snapshots</text>
  <text class="sub" x="895" y="222" text-anchor="middle">Evidence chain</text>

  <!-- Alerts -->
  <rect class="node" x="826" y="240" width="138" height="48" rx="10"/>
  <text class="title" x="895" y="262" text-anchor="middle">Alerts</text>
  <text class="sub" x="895" y="278" text-anchor="middle">WS · Telegram · TTS</text>

  <!-- React dashboard -->
  <rect class="node" x="984" y="156" width="132" height="84" rx="12"/>
  <text class="title" x="1050" y="190" text-anchor="middle">React</text>
  <text class="title" x="1050" y="208" text-anchor="middle">Dashboard</text>
  <text class="sub" x="1050" y="226" text-anchor="middle">Operator browser</text>

  <!-- Flows -->
  <path class="flow" d="M184 177 H196"/>
  <path class="flow" d="M316 177 H376"/>
  <path class="flow" d="M496 177 H508"/>
  <path class="flow" d="M628 177 H640"/>
  <path class="flow" d="M760 168 H826 V152"/>
  <path class="flow" d="M760 184 H826 V208"/>
  <path class="flow" d="M760 196 H806 V264 H826"/>
  <path class="flow" d="M964 264 H974 V198 H984"/>
  <path class="flow" d="M964 152 H974 V198 H984"/>

  <!-- Footnote -->
  <text x="40" y="336" fill="#a8a29e" font-size="11" font-weight="600">Custom-trained YOLO11 · CLAHE low-light · WebSocket &lt;1s alerts · bcrypt + RBAC + audit log · Docker deploy</text>
</svg>
